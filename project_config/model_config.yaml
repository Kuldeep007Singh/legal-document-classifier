# Code Path: config/model_config.yaml

# Model Configuration
model_name: "bert-base-uncased"
legal_bert_model: "nlpaueb/legal-bert-base-uncased"
max_sequence_length: 512
batch_size: 16
learning_rate: 2e-5
num_epochs: 10
warmup_steps: 500
weight_decay: 0.01
dropout_rate: 0.1

# Model Architecture
hidden_size: 768
num_attention_heads: 12
num_hidden_layers: 12
intermediate_size: 3072

# Model Variants
models:
  traditional:
    - name: "svm"
      kernel: "linear"
      C: 1.0
    - name: "random_forest"
      n_estimators: 100
      max_depth: 20
    - name: "logistic_regression"
      C: 1.0
      max_iter: 1000
  
  transformer:
    - name: "bert"
      model_name: "bert-base-uncased"
    - name: "legal_bert"
      model_name: "nlpaueb/legal-bert-base-uncased"
    - name: "roberta"
      model_name: "roberta-base"
    - name: "distilbert"
      model_name: "distilbert-base-uncased"

# Ensemble Configuration
ensemble:
  enable: true
  voting: "soft"
  models: ["bert", "legal_bert", "svm"]
  weights: [0.4, 0.4, 0.2]

# Feature Extraction
features:
  tfidf:
    max_features: 10000
    ngram_range: [1, 3]
    min_df: 2
    max_df: 0.95
  
  word2vec:
    vector_size: 300
    window: 5
    min_count: 2
    workers: 4
  
  legal_features:
    extract_legal_entities: true
    extract_citations: true
    extract_clauses: true